services:
  - type: web
    name: yellow-house-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: pnpm install
    startCommand: pnpm -F backend start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: yellow-house-postgres
          property: connectionString
    
  - type: pserv
    name: yellow-house-postgres
    env: postgres
    region: frankfurt
    plan: free
    ipAllowList: []
    preDeployCommand: pnpm -F backend run db:migrate
