name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: |
          cd packages/backend
          pnpm tsc
          cd ../frontend
          pnpm tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Lint
        run: |
          cd packages/frontend
          pnpm lint
